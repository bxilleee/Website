<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Director's Cut | Editor Portfolio</title>
    <style>
        /* --- 🎨 THE LUXE PALETTE --- */
        :root {
            --obsidian: #0B0E14;
            --gold: #D4AF37;
            --cloud: #F0EEE9;
            --slate: rgba(45, 52, 54, 0.6); /* Glassmorphism base */
            --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--obsidian);
            color: var(--cloud);
            font-family: 'Inter', sans-serif; /* 2026 Standard Clean Font */
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- ✨ ANIMATIONS --- */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: var(--transition);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- 📱 ADAPTIVE NAVIGATION --- */
        nav {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--gold);
            text-transform: uppercase;
        }

        /* --- 🎬 HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
        }

        .hero h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.9;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, #F0EEE9, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- 🍱 BENTO GRID (DESKTOP) --- */
        .work-grid {
            display: grid;
            gap: 20px;
            padding: 5%;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 300px;
        }

        .project-card {
            background: var(--slate);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: flex-end;
            padding: 2rem;
        }

        .project-card:hover {
            border-color: var(--gold);
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Adaptive UI: Span columns for 'Featured' looks */
        .card-large { grid-column: span 2; grid-row: span 2; }
        .card-tall { grid-row: span 2; }

        /* --- 📱 MOBILE ADAPTATION --- */
        @media (max-width: 768px) {
            .work-grid {
                grid-template-columns: 1fr; /* Single column for mobile */
                grid-auto-rows: 400px;
            }
            .card-large, .card-tall { grid-column: span 1; grid-row: span 1; }
            
            .hero h1 { font-size: 4rem; }
        }

        .play-btn {
            color: var(--gold);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 1px solid var(--gold);
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Alex Edit.</div>
        <div class="menu-dot">● ● ●</div>
    </nav>

    <section class="hero">
        <h1 class="reveal">CRAFTING<br>MOTION</h1>
        <p class="reveal">Visual Storytelling & High-End Post Production</p>
    </section>

    <section class="work-grid">
        <div class="project-card card-large reveal">
            <div class="play-btn">View Reel 01</div>
        </div>

        <div class="project-card reveal">
            <div class="play-btn">Music Video</div>
        </div>

        <div class="project-card card-tall reveal">
            <div class="play-btn">Documentary</div>
        </div>

        <div class="project-card reveal">
            <div class="play-btn">Commercial</div>
        </div>
    </section>

    <script>
        // --- 💨 SMOOTH SCROLL REVEAL LOGIC ---
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // --- 🖱️ MOUSE MOVE KINETIC EFFECT ---
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            document.querySelector('.hero h1').style.transform = `translateX(${x}px) translateY(${y}px)`;
        });
    </script>
</body>
</html>
